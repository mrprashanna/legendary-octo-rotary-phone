<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Prashanna Shrestha — System Architect & Level 99 Developer. Cyberpunk portfolio with interactive HUD interface.">
    <title>Prashanna Shrestha | Level 99 Dev</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Black+Ops+One&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-lines" aria-hidden="true"></div>
    <div class="bg-particles" id="particles" aria-hidden="true"></div>

    <!-- Main Interface -->
    <div class="hud-container" role="main">

        <!-- Corner Decorations -->
        <div class="corner topleft" aria-hidden="true"></div>
        <div class="corner topright" aria-hidden="true"></div>
        <div class="corner bottomleft" aria-hidden="true"></div>
        <div class="corner bottomright" aria-hidden="true"></div>

        <!-- Profile Section -->
        <div class="profile-card" id="card">
            <div class="profile-frame">
                <div class="avatar-placeholder">
                    <span class="misfit-text" aria-label="The Misfit - Creative Developer Persona">The Misfit</span>
                </div>
                <div class="power-level" aria-label="Username">@mrprashanna</div>
            </div>

            <div class="info-panel">
                <h1 class="glitch-name" data-text="PRASHANNA SHRESTHA" aria-label="Prashanna Shrestha">PRASHANNA SHRESTHA</h1>
                <div class="role-badge" role="status">SYSTEM ARCHITECT</div>

                <nav class="stats-grid" aria-label="Social Links">
                    <a href="https://instagram.com/mrprashanna" target="_blank" rel="noopener noreferrer" class="stat-item neon-pink" aria-label="Visit Instagram @mrprashanna">
                        <div class="label">INSTAGRAM</div>
                        <div class="value">@mrprashanna</div>
                        <div class="bar-container" aria-hidden="true">
                            <div class="bar" style="width: 85%"></div>
                        </div>
                    </a>

                    <a href="https://github.com/mrprashanna" target="_blank" rel="noopener noreferrer" class="stat-item neon-blue" aria-label="Visit GitHub @mrprashanna">
                        <div class="label">GITHUB</div>
                        <div class="value">@mrprashanna</div>
                        <div class="bar-container" aria-hidden="true">
                            <div class="bar" style="width: 95%"></div>
                        </div>
                    </a>

                    <a href="mailto:hello@prashannashrestha.com.np" class="stat-item neon-green" aria-label="Send email to Prashanna">
                        <div class="label">COMMS</div>
                        <div class="value">EMAIL LINK</div>
                        <div class="bar-container" aria-hidden="true">
                            <div class="bar" style="width: 100%"></div>
                        </div>
                    </a>
                </nav>
            </div>
        </div>

        <div class="scan-line" aria-hidden="true"></div>
    </div>

    <!-- NoScript Fallback -->
    <noscript>
        <style>
            .hud-container { opacity: 1 !important; transform: none !important; }
            .scan-line, .bg-lines, .bg-particles { display: none; }
            .stat-item { transform: none !important; }
        </style>
        <div style="position:fixed;inset:0;background:#05050a;display:flex;align-items:center;justify-content:center;z-index:9999;">
            <p style="color:#fdcb6e;font-family:'Rajdhani',sans-serif;text-align:center;padding:2rem;">
                ⚡ JavaScript is disabled.<br>
                <small>Enable JS for the full Level 99 interactive experience.</small>
            </p>
        </div>
    </noscript>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
